name: Backend CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test-backend:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install Node dependencies
      run: npm install

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r tests/requirements.txt

    - name: Run Backend Integration & Security Tests
      run: |
        python tests/run_tests_and_report.py --backend
        if [ -f tests/reports/summary.md ]; then
          cat tests/reports/summary.md >> $GITHUB_STEP_SUMMARY
        fi

    - name: Archive Backend Test Report
      uses: actions/upload-artifact@v4
      with:
        name: backend-test-report
        path: |
          backend_test_report.xlsx
          backend_test_report.md
          tests/reports/backend_test_report.xlsx
          tests/reports/backend_test_report.md
        if-no-files-found: warn
