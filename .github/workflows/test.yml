name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install Node dependencies
      run: npm install

    - name: Build frontend
      run: npm run build

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r tests/requirements.txt

    - name: Run E2E Test Suite and Generate Report
      run: |
        python tests/run_tests_and_report.py

    - name: Archive Test Reports
      uses: actions/upload-artifact@v4
      with:
        name: test-reports
        path: |
          test_report.xlsx
          frontend_test_report.xlsx
          tests/reports/test_report.xlsx
